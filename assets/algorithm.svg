<svg xmlns="http://www.w3.org/2000/svg" width="960" height="1520" viewBox="0 0 960 1520">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#DC2626"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16A34A"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7C3AED"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EA580C"/>
    </marker>
  </defs>

  <!-- BACKGROUND -->
  <rect width="960" height="1520" fill="#F8FAFC"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- HEADER                                                  -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="0" y="0" width="960" height="90" fill="#0F172A"/>
  <text x="480" y="34" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" letter-spacing="3" fill="#FFFFFF">HTSA — THE ALGORITHM</text>
  <text x="480" y="56" text-anchor="middle" font-family="sans-serif" font-size="11" letter-spacing="1" fill="#64748B">A graph traversal algorithm for causal inference</text>
  <text x="480" y="76" text-anchor="middle" font-family="sans-serif" font-size="9" letter-spacing="1.5" fill="#475569">INPUT: Problem  ·  OUTPUT: Root cause + action plan  ·  PROCESSOR: You</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- MATH SIDEBAR — left column labels                       -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Graph Theory label -->
  <rect x="24" y="112" width="120" height="26" rx="4" fill="#1E293B"/>
  <text x="84" y="129" text-anchor="middle" font-family="monospace" font-size="8" font-weight="700" fill="#3B82F6">01 GRAPH THEORY</text>
  <text x="84" y="148" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#94A3B8">Data structure: DAG</text>

  <!-- Exponential label -->
  <rect x="24" y="310" width="120" height="26" rx="4" fill="#1E293B"/>
  <text x="84" y="327" text-anchor="middle" font-family="monospace" font-size="8" font-weight="700" fill="#3B82F6">02 EXP. SPACE</text>
  <text x="84" y="346" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#94A3B8">Complexity: b^d</text>

  <!-- Causal Inference label -->
  <rect x="24" y="490" width="120" height="26" rx="4" fill="#1E293B"/>
  <text x="84" y="507" text-anchor="middle" font-family="monospace" font-size="8" font-weight="700" fill="#3B82F6">03 CAUSAL INF.</text>
  <text x="84" y="526" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#94A3B8">Counterfactual test</text>

  <!-- Information Theory label -->
  <rect x="24" y="650" width="120" height="26" rx="4" fill="#1E293B"/>
  <text x="84" y="667" text-anchor="middle" font-family="monospace" font-size="8" font-weight="700" fill="#3B82F6">04 INFO. THEORY</text>
  <text x="84" y="686" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#94A3B8">H(X) → measure</text>

  <!-- Bayesian label -->
  <rect x="24" y="790" width="120" height="26" rx="4" fill="#1E293B"/>
  <text x="84" y="807" text-anchor="middle" font-family="monospace" font-size="8" font-weight="700" fill="#3B82F6">05 BAYESIAN</text>
  <text x="84" y="826" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#94A3B8">P(H|E) → update</text>

  <!-- Search label -->
  <rect x="24" y="930" width="120" height="26" rx="4" fill="#1E293B"/>
  <text x="84" y="947" text-anchor="middle" font-family="monospace" font-size="8" font-weight="700" fill="#3B82F6">06 SEARCH ALG.</text>
  <text x="84" y="966" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#94A3B8">DFS / BFS / A*</text>

  <!-- Biases label -->
  <rect x="24" y="1060" width="120" height="26" rx="4" fill="#1E293B"/>
  <text x="84" y="1077" text-anchor="middle" font-family="monospace" font-size="8" font-weight="700" fill="#3B82F6">07 BIASES</text>
  <text x="84" y="1096" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#94A3B8">Processor errors</text>

  <!-- Evidence label -->
  <rect x="24" y="1190" width="120" height="26" rx="4" fill="#1E293B"/>
  <text x="84" y="1207" text-anchor="middle" font-family="monospace" font-size="8" font-weight="700" fill="#3B82F6">08 EVIDENCE</text>
  <text x="84" y="1226" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#94A3B8">Input quality</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- FLOWCHART — main column                                 -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- ─── START (rounded rectangle) ─── -->
  <rect x="400" y="108" width="200" height="44" rx="22" fill="#0F172A" stroke="#334155" stroke-width="1.5"/>
  <text x="500" y="135" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="white">START</text>

  <!-- Arrow: START → INITIALIZE -->
  <line x1="500" y1="152" x2="500" y2="178" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ─── INITIALIZE: 5 Ws ─── -->
  <rect x="340" y="182" width="320" height="68" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="500" y="204" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="#1D4ED8">INITIALIZE  (5 Ws)</text>
  <text x="500" y="222" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#3B82F6">origin_node  =  define( Who, What, When, Where )</text>
  <text x="500" y="238" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#3B82F6">surface_why  =  Why( initial observation )</text>

  <!-- Arrow: INITIALIZE → SET PRIORS -->
  <line x1="500" y1="250" x2="500" y2="276" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ─── SET PRIORS ─── -->
  <rect x="355" y="280" width="290" height="50" rx="6" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="500" y="302" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="#C2410C">SET PRIORS</text>
  <text x="500" y="319" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#EA580C">P(H) = base_rate( each hypothesis )</text>

  <!-- Arrow: SET PRIORS → EXPAND NODE -->
  <line x1="500" y1="330" x2="500" y2="356" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ─── EXPAND NODE (the main loop entry) ─── -->
  <rect x="340" y="360" width="320" height="68" rx="6" fill="#FEF2F2" stroke="#DC2626" stroke-width="2"/>
  <text x="500" y="382" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="#DC2626">EXPAND NODE  (ask Why)</text>
  <text x="500" y="399" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#B91C1C">children[ ]  =  generate_why_answers( current_node )</text>
  <text x="500" y="416" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#B91C1C">branches  +=  len( children )</text>

  <!-- LOOP LABEL -->
  <rect x="670" y="366" width="96" height="22" rx="11" fill="#DC2626"/>
  <text x="718" y="381" text-anchor="middle" font-family="monospace" font-size="8" font-weight="700" fill="white">MAIN LOOP</text>

  <!-- Arrow: EXPAND → GATHER EVIDENCE -->
  <line x1="500" y1="428" x2="500" y2="454" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ─── GATHER EVIDENCE ─── -->
  <rect x="355" y="458" width="290" height="50" rx="6" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5"/>
  <text x="500" y="480" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="#15803D">GATHER EVIDENCE</text>
  <text x="500" y="497" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#16A34A">E  =  collect( tier_1, tier_2, tier_3, tier_4 )</text>

  <!-- Arrow: GATHER → COUNTERFACTUAL TEST -->
  <line x1="500" y1="508" x2="500" y2="534" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ─── COUNTERFACTUAL TEST (diamond) ─── -->
  <polygon points="500,538 610,588 500,638 390,588" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="500" y="580" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="#92400E">COUNTERFACTUAL</text>
  <text x="500" y="594" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="#92400E">TEST</text>
  <text x="500" y="610" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#B45309">Without X, would</text>
  <text x="500" y="622" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#B45309">problem still occur?</text>

  <!-- YES arrow (right) — not a cause -->
  <line x1="610" y1="588" x2="700" y2="588" stroke="#DC2626" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="650" y="580" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="#DC2626">YES</text>
  <rect x="704" y="573" width="140" height="30" rx="4" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="774" y="592" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#B91C1C">Not a cause → prune</text>

  <!-- NO arrow (down) — genuine cause -->
  <line x1="500" y1="638" x2="500" y2="664" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="516" y="656" font-family="monospace" font-size="9" font-weight="700" fill="#16A34A">NO</text>

  <!-- ─── COMPUTE INFORMATION GAIN ─── -->
  <rect x="355" y="668" width="290" height="50" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="500" y="690" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#1D4ED8">COMPUTE INFO GAIN</text>
  <text x="500" y="707" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#3B82F6">IG  =  H( before )  −  H( after )</text>

  <!-- Arrow: INFO GAIN → BAYESIAN UPDATE -->
  <line x1="500" y1="718" x2="500" y2="744" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ─── BAYESIAN UPDATE ─── -->
  <rect x="340" y="748" width="320" height="68" rx="6" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="500" y="770" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="#C2410C">BAYESIAN UPDATE</text>
  <text x="500" y="788" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#EA580C">P(H|E)  =  P(E|H) × P(H) / P(E)</text>
  <text x="500" y="805" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#EA580C">for each hypothesis in branches</text>

  <!-- Arrow: BAYESIAN → PRUNE DECISION -->
  <line x1="500" y1="816" x2="500" y2="842" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ─── PRUNE DECISION (diamond) ─── -->
  <polygon points="500,846 600,886 500,926 400,886" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="500" y="880" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="#5B21B6">P(branch)</text>
  <text x="500" y="895" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="#5B21B6">&lt; 5% ?</text>

  <!-- YES arrow (right) — prune -->
  <line x1="600" y1="886" x2="700" y2="886" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <text x="645" y="878" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="#7C3AED">YES</text>
  <rect x="704" y="871" width="140" height="30" rx="4" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <text x="774" y="890" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5B21B6">PRUNE branch</text>

  <!-- NO arrow (down) — continue -->
  <line x1="500" y1="926" x2="500" y2="952" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="516" y="944" font-family="monospace" font-size="9" font-weight="700" fill="#16A34A">NO</text>

  <!-- ─── SELECT NEXT BRANCH ─── -->
  <rect x="355" y="956" width="290" height="50" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="500" y="978" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#1D4ED8">SELECT NEXT BRANCH</text>
  <text x="500" y="995" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#3B82F6">next  =  argmax( P(H) )  [Best-First / A*]</text>

  <!-- Arrow: SELECT → DEPTH CHECK -->
  <line x1="500" y1="1006" x2="500" y2="1032" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ─── DEPTH CHECK (diamond) — termination condition ─── -->
  <polygon points="500,1036 625,1096 500,1156 375,1096" fill="#F0FDF4" stroke="#16A34A" stroke-width="2"/>
  <text x="500" y="1082" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="#15803D">DEPTH CRITERIA</text>
  <text x="500" y="1097" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#16A34A">Actionable? Counterfactual?</text>
  <text x="500" y="1110" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#16A34A">Boundary? Returns?</text>

  <!-- FAIL arrow (right) — loop back -->
  <line x1="625" y1="1096" x2="750" y2="1096" stroke="#DC2626" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="682" y="1088" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="#DC2626">FAIL</text>

  <!-- Loop back arrow: goes up from right side back to EXPAND NODE -->
  <line x1="750" y1="1096" x2="750" y2="394" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="750" y1="394" x2="664" y2="394" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-red)"/>
  <text font-family="monospace" font-size="8" fill="#DC2626" text-anchor="middle"
        transform="translate(762,750) rotate(-90)">go deeper — ask next Why</text>

  <!-- BIAS CHECK label on loop -->
  <rect x="756" y="1040" width="126" height="34" rx="4" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="819" y="1054" text-anchor="middle" font-family="monospace" font-size="7.5" font-weight="700" fill="#DC2626">BIAS CHECK</text>
  <text x="819" y="1067" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#B91C1C">Run 7-bias checklist</text>

  <!-- PASS arrow (down) — root cause found -->
  <line x1="500" y1="1156" x2="500" y2="1182" stroke="#16A34A" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="520" y="1174" font-family="monospace" font-size="9" font-weight="700" fill="#16A34A">PASS</text>

  <!-- ─── ROOT CAUSE FOUND ─── -->
  <rect x="370" y="1186" width="260" height="44" rx="6" fill="#991B1B" stroke="#7F1D1D" stroke-width="1.5"/>
  <text x="500" y="1206" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="white">ROOT CAUSE FOUND</text>
  <text x="500" y="1222" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#FCA5A5">leaf node reached — actionable</text>

  <!-- Arrow: ROOT CAUSE → RESOLVE -->
  <line x1="500" y1="1230" x2="500" y2="1256" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ─── RESOLVE ─── -->
  <rect x="340" y="1260" width="320" height="56" rx="6" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5"/>
  <text x="500" y="1282" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="#15803D">RESOLVE</text>
  <text x="500" y="1299" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#16A34A">action  =  fix | mitigate | accept</text>
  <text x="500" y="1312" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#16A34A">priority  =  impact  ×  recurrence  ×  actionability</text>

  <!-- Arrow: RESOLVE → VERIFY -->
  <line x1="500" y1="1316" x2="500" y2="1342" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ─── VERIFY (diamond) ─── -->
  <polygon points="500,1346 590,1386 500,1426 410,1386" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="500" y="1380" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="#5B21B6">FIX</text>
  <text x="500" y="1395" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="#5B21B6">WORKED?</text>

  <!-- NO arrow (right) — recur -->
  <line x1="590" y1="1386" x2="680" y2="1386" stroke="#DC2626" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="630" y="1378" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="#DC2626">NO</text>
  <rect x="684" y="1371" width="168" height="30" rx="4" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="768" y="1390" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#B91C1C">Return to EXPAND NODE</text>

  <!-- YES arrow (down) — done -->
  <line x1="500" y1="1426" x2="500" y2="1452" stroke="#16A34A" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="520" y="1444" font-family="monospace" font-size="9" font-weight="700" fill="#16A34A">YES</text>

  <!-- ─── TERMINATE ─── -->
  <rect x="370" y="1456" width="260" height="44" rx="22" fill="#0F172A" stroke="#334155" stroke-width="1.5"/>
  <text x="500" y="1475" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="white">UPDATE PRIORS → END</text>
  <text x="500" y="1491" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#64748B">H(X) ≈ 0  ·  investigation closed</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- RECURSIVE ARROW — root cause becomes new WHAT           -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <path d="M 370,1208 Q 200,1208 200,1100 L 200,210 Q 200,192 220,192 L 336,192"
        stroke="#CBD5E1" stroke-width="1.5" fill="none"
        stroke-dasharray="6,4"
        marker-end="url(#arr)"/>
  <text font-family="monospace" font-size="8" fill="#94A3B8" text-anchor="middle"
        transform="translate(188,700) rotate(-90)">RECURSIVE: root cause becomes new WHAT → run again</text>

</svg>
