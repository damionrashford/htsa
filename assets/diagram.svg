<svg xmlns="http://www.w3.org/2000/svg" width="900" height="780" viewBox="0 0 900 780">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/>
    </marker>
    <marker id="arr-dash" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#CBD5E1"/>
    </marker>
  </defs>

  <!-- BACKGROUND -->
  <rect width="900" height="780" fill="#F1F5F9"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- HEADER                                                  -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="0" y="0" width="900" height="82" fill="#0F172A"/>
  <text x="450" y="34" text-anchor="middle" font-family="sans-serif" font-size="21" font-weight="700" letter-spacing="3" fill="#FFFFFF">HOW TO SOLVE ANYTHING</text>
  <text x="450" y="58" text-anchor="middle" font-family="sans-serif" font-size="10" letter-spacing="1.5" fill="#475569">SOMETHING HAPPENED  ·  TO SOMEONE  ·  SOMEWHERE  ·  AT SOME POINT  ·  FOR SOME REASON</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LAYER 1 — SITUATION MAP                                 -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="30" y="100" width="820" height="116" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="30" y="100" width="5" height="116" rx="3" fill="#2563EB"/>

  <!-- Badge + title -->
  <rect x="48" y="110" width="14" height="14" rx="3" fill="#2563EB"/>
  <text x="55" y="121" text-anchor="middle" font-family="sans-serif" font-size="7.5" font-weight="700" fill="white">1</text>
  <text x="71" y="121" font-family="sans-serif" font-size="8.5" font-weight="700" letter-spacing="2" fill="#2563EB">SITUATION MAP</text>
  <text x="48" y="137" font-family="sans-serif" font-size="10" fill="#64748B">Establish the full picture before drilling into cause. Incomplete 5 Ws produce incorrect 5 Whys.</text>

  <!-- WHO -->
  <rect x="48" y="146" width="148" height="58" rx="4" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="122" y="165" text-anchor="middle" font-family="sans-serif" font-size="9.5" font-weight="700" letter-spacing="1.5" fill="#1D4ED8">WHO</text>
  <text x="122" y="181" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#3B82F6">Actor · Stakeholder</text>
  <text x="122" y="196" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#3B82F6">Originator · Resolver</text>

  <!-- WHAT -->
  <rect x="208" y="146" width="148" height="58" rx="4" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="282" y="165" text-anchor="middle" font-family="sans-serif" font-size="9.5" font-weight="700" letter-spacing="1.5" fill="#1D4ED8">WHAT</text>
  <text x="282" y="181" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#3B82F6">Event · Problem</text>
  <text x="282" y="196" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#3B82F6">Incident · Failure</text>

  <!-- WHEN -->
  <rect x="368" y="146" width="148" height="58" rx="4" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="442" y="165" text-anchor="middle" font-family="sans-serif" font-size="9.5" font-weight="700" letter-spacing="1.5" fill="#1D4ED8">WHEN</text>
  <text x="442" y="181" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#3B82F6">Timeline · Sequence</text>
  <text x="442" y="196" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#3B82F6">Before · During · After</text>

  <!-- WHERE -->
  <rect x="528" y="146" width="148" height="58" rx="4" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="602" y="165" text-anchor="middle" font-family="sans-serif" font-size="9.5" font-weight="700" letter-spacing="1.5" fill="#1D4ED8">WHERE</text>
  <text x="602" y="181" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#3B82F6">System · Environment</text>
  <text x="602" y="196" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#3B82F6">Location · Context</text>

  <!-- WHY (surface) — highlighted as entry point -->
  <rect x="688" y="146" width="152" height="58" rx="4" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1.5"/>
  <text x="764" y="165" text-anchor="middle" font-family="sans-serif" font-size="9.5" font-weight="700" letter-spacing="1.5" fill="#C2410C">WHY</text>
  <text x="764" y="181" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#EA580C">Surface-level reason</text>
  <text x="764" y="196" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#EA580C">Entry point to Layer 2 ↓</text>

  <!-- Arrow 1 → 2 -->
  <line x1="450" y1="218" x2="450" y2="234" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LAYER 2 — CAUSAL CHAIN                                  -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="30" y="238" width="820" height="218" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="30" y="238" width="5" height="218" rx="3" fill="#DC2626"/>

  <rect x="48" y="248" width="14" height="14" rx="3" fill="#DC2626"/>
  <text x="55" y="259" text-anchor="middle" font-family="sans-serif" font-size="7.5" font-weight="700" fill="white">2</text>
  <text x="71" y="259" font-family="sans-serif" font-size="8.5" font-weight="700" letter-spacing="2" fill="#DC2626">CAUSAL CHAIN</text>
  <text x="48" y="274" font-family="sans-serif" font-size="10" fill="#64748B">Ask why again. Keep going until actionable. Whys branch — follow all of them.</text>

  <!-- Surface Why node -->
  <rect x="350" y="284" width="200" height="32" rx="4" fill="#FEF2F2" stroke="#FECACA" stroke-width="1.5"/>
  <text x="450" y="304" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#DC2626">WHY  (surface)</text>

  <!-- Branch lines: surface → Why1a, Why1b -->
  <line x1="390" y1="316" x2="240" y2="350" stroke="#FCA5A5" stroke-width="1.5"/>
  <line x1="510" y1="316" x2="660" y2="350" stroke="#FCA5A5" stroke-width="1.5"/>

  <!-- Why 1a -->
  <rect x="158" y="350" width="164" height="28" rx="4" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="240" y="368" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#B91C1C">Why 1a</text>

  <!-- Why 1b -->
  <rect x="578" y="350" width="164" height="28" rx="4" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="660" y="368" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#B91C1C">Why 1b</text>

  <!-- Lines: Why1a → Root A -->
  <line x1="240" y1="378" x2="185" y2="410" stroke="#FCA5A5" stroke-width="1.5"/>

  <!-- Lines: Why1b → Root B, Root C -->
  <line x1="636" y1="378" x2="595" y2="410" stroke="#FCA5A5" stroke-width="1.5"/>
  <line x1="684" y1="378" x2="730" y2="410" stroke="#FCA5A5" stroke-width="1.5"/>

  <!-- Root Cause A -->
  <rect x="110" y="410" width="150" height="32" rx="4" fill="#991B1B"/>
  <text x="185" y="424" text-anchor="middle" font-family="sans-serif" font-size="8.5" font-weight="700" fill="white">ROOT CAUSE A</text>
  <text x="185" y="436" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#FCA5A5">actionable</text>

  <!-- Root Cause B -->
  <rect x="520" y="410" width="150" height="32" rx="4" fill="#991B1B"/>
  <text x="595" y="424" text-anchor="middle" font-family="sans-serif" font-size="8.5" font-weight="700" fill="white">ROOT CAUSE B</text>
  <text x="595" y="436" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#FCA5A5">actionable</text>

  <!-- Root Cause C -->
  <rect x="655" y="410" width="150" height="32" rx="4" fill="#7F1D1D"/>
  <text x="730" y="424" text-anchor="middle" font-family="sans-serif" font-size="8.5" font-weight="700" fill="white">ROOT CAUSE C</text>
  <text x="730" y="436" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#FCA5A5">convergent node</text>

  <!-- Arrow 2 → 3 -->
  <line x1="450" y1="458" x2="450" y2="474" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LAYER 3 — RESOLUTION                                    -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="30" y="478" width="820" height="96" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="30" y="478" width="5" height="96" rx="3" fill="#16A34A"/>

  <rect x="48" y="488" width="14" height="14" rx="3" fill="#16A34A"/>
  <text x="55" y="499" text-anchor="middle" font-family="sans-serif" font-size="7.5" font-weight="700" fill="white">3</text>
  <text x="71" y="499" font-family="sans-serif" font-size="8.5" font-weight="700" letter-spacing="2" fill="#16A34A">RESOLUTION</text>
  <text x="48" y="514" font-family="sans-serif" font-size="10" fill="#64748B">Map each root cause to a concrete change. Apply the counterfactual test before closing.</text>

  <!-- FIX -->
  <rect x="48" y="523" width="248" height="40" rx="4" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="172" y="538" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" letter-spacing="1" fill="#15803D">FIX</text>
  <text x="172" y="554" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#16A34A">Permanently eliminate the root cause</text>

  <!-- MITIGATE -->
  <rect x="310" y="523" width="248" height="40" rx="4" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
  <text x="434" y="538" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" letter-spacing="1" fill="#B45309">MITIGATE</text>
  <text x="434" y="554" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#D97706">Reduce impact — root cause remains</text>

  <!-- ACCEPT -->
  <rect x="572" y="523" width="248" height="40" rx="4" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1"/>
  <text x="696" y="538" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" letter-spacing="1" fill="#6D28D9">ACCEPT</text>
  <text x="696" y="554" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#7C3AED">Outside control — document the risk</text>

  <!-- Arrow 3 → 4 -->
  <line x1="450" y1="576" x2="450" y2="592" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LAYER 4 — VERIFICATION AND LEARNING                     -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="30" y="596" width="820" height="82" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="30" y="596" width="5" height="82" rx="3" fill="#7C3AED"/>

  <rect x="48" y="606" width="14" height="14" rx="3" fill="#7C3AED"/>
  <text x="55" y="617" text-anchor="middle" font-family="sans-serif" font-size="7.5" font-weight="700" fill="white">4</text>
  <text x="71" y="617" font-family="sans-serif" font-size="8.5" font-weight="700" letter-spacing="2" fill="#7C3AED">VERIFICATION &amp; LEARNING</text>
  <text x="48" y="632" font-family="sans-serif" font-size="10" fill="#64748B">Confirm the fix worked. Update priors. Document surprises. The system compounds over time.</text>

  <!-- 4 step boxes -->
  <rect x="48" y="641" width="178" height="28" rx="3" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <text x="137" y="659" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#5B21B6">Confirm fix worked</text>

  <text x="240" y="659" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#CBD5E1">›</text>

  <rect x="252" y="641" width="178" height="28" rx="3" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <text x="341" y="659" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#5B21B6">Monitor — no recurrence</text>

  <text x="444" y="659" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#CBD5E1">›</text>

  <rect x="456" y="641" width="178" height="28" rx="3" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <text x="545" y="659" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#5B21B6">Update priors</text>

  <text x="648" y="659" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#CBD5E1">›</text>

  <rect x="660" y="641" width="178" height="28" rx="3" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <text x="749" y="659" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#5B21B6">Close investigation</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- RECURSIVE LOOP ARROW (right side)                       -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <path d="M 852,668 Q 874,668 874,648 L 874,256 Q 874,238 852,238"
        stroke="#CBD5E1" stroke-width="1.5" fill="none"
        stroke-dasharray="5,4"
        marker-end="url(#arr-dash)"/>
  <text font-family="sans-serif" font-size="7" fill="#94A3B8" text-anchor="middle"
        transform="translate(884,453) rotate(-90)">ROOT CAUSE BECOMES NEW WHAT  (recursive)</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- MATHEMATICAL FOUNDATIONS                                -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="30" y="696" width="820" height="72" rx="6" fill="#0F172A"/>

  <text x="450" y="712" text-anchor="middle" font-family="sans-serif" font-size="7.5" font-weight="700" letter-spacing="2.5" fill="#475569">MATHEMATICAL FOUNDATIONS</text>

  <!-- 8 boxes: width 88, gap 10, total 8×88+7×10=774, start x=61 -->
  <rect x="61"  y="718" width="88" height="38" rx="3" fill="#1E293B"/>
  <text x="105" y="731" text-anchor="middle" font-family="sans-serif" font-size="7.5" font-weight="700" fill="#3B82F6">01</text>
  <text x="105" y="748" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#94A3B8">Graph Theory</text>

  <rect x="159" y="718" width="88" height="38" rx="3" fill="#1E293B"/>
  <text x="203" y="731" text-anchor="middle" font-family="sans-serif" font-size="7.5" font-weight="700" fill="#3B82F6">02</text>
  <text x="203" y="748" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#94A3B8">Exp. Problem</text>

  <rect x="257" y="718" width="88" height="38" rx="3" fill="#1E293B"/>
  <text x="301" y="731" text-anchor="middle" font-family="sans-serif" font-size="7.5" font-weight="700" fill="#3B82F6">03</text>
  <text x="301" y="748" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#94A3B8">Causal Inference</text>

  <rect x="355" y="718" width="88" height="38" rx="3" fill="#1E293B"/>
  <text x="399" y="731" text-anchor="middle" font-family="sans-serif" font-size="7.5" font-weight="700" fill="#3B82F6">04</text>
  <text x="399" y="748" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#94A3B8">Info. Theory</text>

  <rect x="453" y="718" width="88" height="38" rx="3" fill="#1E293B"/>
  <text x="497" y="731" text-anchor="middle" font-family="sans-serif" font-size="7.5" font-weight="700" fill="#3B82F6">05</text>
  <text x="497" y="748" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#94A3B8">Bayesian</text>

  <rect x="551" y="718" width="88" height="38" rx="3" fill="#1E293B"/>
  <text x="595" y="731" text-anchor="middle" font-family="sans-serif" font-size="7.5" font-weight="700" fill="#3B82F6">06</text>
  <text x="595" y="748" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#94A3B8">Search Algorithms</text>

  <rect x="649" y="718" width="88" height="38" rx="3" fill="#1E293B"/>
  <text x="693" y="731" text-anchor="middle" font-family="sans-serif" font-size="7.5" font-weight="700" fill="#3B82F6">07</text>
  <text x="693" y="748" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#94A3B8">Cognitive Biases</text>

  <rect x="747" y="718" width="88" height="38" rx="3" fill="#1E293B"/>
  <text x="791" y="731" text-anchor="middle" font-family="sans-serif" font-size="7.5" font-weight="700" fill="#3B82F6">08</text>
  <text x="791" y="748" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#94A3B8">Evidence Eval.</text>

</svg>
